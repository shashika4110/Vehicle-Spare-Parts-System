<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Product Images</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .product {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            display: flex;
            gap: 15px;
        }
        .product img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 4px;
        }
        .product-info {
            flex: 1;
        }
        .error {
            color: red;
            padding: 10px;
            background: #fee;
            border-radius: 4px;
            margin: 10px 0;
        }
        .success {
            color: green;
            padding: 10px;
            background: #efe;
            border-radius: 4px;
            margin: 10px 0;
        }
        pre {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🔍 Product Images Debug Test</h1>
    <div id="status"></div>
    <div id="raw-data"></div>
    <div id="products"></div>

    <script>
        const statusDiv = document.getElementById('status');
        const rawDataDiv = document.getElementById('raw-data');
        const productsDiv = document.getElementById('products');

        // Get token from localStorage
        const userStr = localStorage.getItem('user');
        let token = '';
        if (userStr) {
            try {
                const user = JSON.parse(userStr);
                token = user.token;
                statusDiv.innerHTML += `<div class="success">✅ Token found: ${token.substring(0, 20)}...</div>`;
            } catch (e) {
                statusDiv.innerHTML += `<div class="error">❌ Error parsing user data: ${e.message}</div>`;
            }
        } else {
            statusDiv.innerHTML += `<div class="error">⚠️ No user token found in localStorage</div>`;
        }

        // Test API call
        async function testAPI() {
            try {
                statusDiv.innerHTML += `<div>🔄 Fetching from: http://localhost:8080/api/spareparts</div>`;
                
                const response = await fetch('http://localhost:8080/api/spareparts', {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });

                statusDiv.innerHTML += `<div class="success">✅ Response Status: ${response.status} ${response.statusText}</div>`;

                if (!response.ok) {
                    statusDiv.innerHTML += `<div class="error">❌ Response not OK: ${response.status}</div>`;
                    const errorText = await response.text();
                    statusDiv.innerHTML += `<div class="error">Error: ${errorText}</div>`;
                    return;
                }

                const data = await response.json();
                statusDiv.innerHTML += `<div class="success">✅ Got ${data.length} products</div>`;

                // Show raw data
                rawDataDiv.innerHTML = `<h3>📋 Raw JSON Data (First 2 products):</h3><pre>${JSON.stringify(data.slice(0, 2), null, 2)}</pre>`;

                // Display products
                data.forEach((part, index) => {
                    const hasImage = part.imageUrl && part.imageUrl.trim() !== '';
                    productsDiv.innerHTML += `
                        <div class="product">
                            <div>
                                ${hasImage ? 
                                    `<img src="${part.imageUrl}" 
                                          alt="${part.partName}"
                                          onerror="this.style.border='3px solid red'; this.alt='❌ Failed to load'">` 
                                    : 
                                    `<div style="width:150px;height:150px;background:#ddd;display:flex;align-items:center;justify-content:center;">
                                        ❌ No Image
                                     </div>`
                                }
                            </div>
                            <div class="product-info">
                                <h3>${index + 1}. ${part.partName}</h3>
                                <p><strong>ID:</strong> ${part.id}</p>
                                <p><strong>Category:</strong> ${part.category}</p>
                                <p><strong>Brand:</strong> ${part.brand || 'N/A'}</p>
                                <p><strong>Price:</strong> Rs. ${part.price}</p>
                                <p><strong>Stock:</strong> ${part.stockQuantity}</p>
                                <p><strong>Image URL:</strong> ${hasImage ? part.imageUrl : '❌ MISSING'}</p>
                                ${hasImage ? 
                                    `<p style="color: green;">✅ Has image URL</p>` 
                                    : 
                                    `<p style="color: red;">❌ No image URL in response</p>`
                                }
                            </div>
                        </div>
                    `;
                });

            } catch (error) {
                statusDiv.innerHTML += `<div class="error">❌ Error: ${error.message}</div>`;
                console.error('Full error:', error);
            }
        }

        // Run test
        testAPI();
    </script>
</body>
</html>
