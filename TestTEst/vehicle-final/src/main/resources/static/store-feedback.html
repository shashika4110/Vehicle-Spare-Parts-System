<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Feedback - Store Owner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .feedback-card {
            transition: all 0.3s;
        }
        .feedback-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-read { background: #d1fae5; color: #065f46; }
    </style>
</head>
<body>
    <div class="container mx-auto p-6">
        <!-- Header -->
        <div class="glass rounded-2xl p-6 mb-6">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800 mb-2">
                        <i class="fas fa-comments text-blue-600"></i> Customer Feedback
                    </h1>
                    <p class="text-gray-600">Review and manage customer feedback</p>
                </div>
                <div class="flex gap-4">
                    <button onclick="location.reload()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                    <a href="store-dashboard.html" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700">
                        <i class="fas fa-arrow-left"></i> Back to Dashboard
                    </a>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid md:grid-cols-3 gap-6 mb-6">
            <div class="glass p-6 rounded-2xl">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-700 mb-1 font-semibold">Total Feedback</p>
                        <p id="totalCount" class="text-3xl font-bold text-blue-600">0</p>
                    </div>
                    <i class="fas fa-comments text-5xl text-blue-200"></i>
                </div>
            </div>
            <div class="glass p-6 rounded-2xl">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-700 mb-1 font-semibold">Pending Review</p>
                        <p id="pendingCount" class="text-3xl font-bold text-yellow-600">0</p>
                    </div>
                    <i class="fas fa-clock text-5xl text-yellow-200"></i>
                </div>
            </div>
            <div class="glass p-6 rounded-2xl">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-700 mb-1 font-semibold">Read</p>
                        <p id="readCount" class="text-3xl font-bold text-green-600">0</p>
                    </div>
                    <i class="fas fa-check-circle text-5xl text-green-200"></i>
                </div>
            </div>
        </div>

        <!-- Feedback List -->
        <div class="glass rounded-2xl p-6">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">All Feedback Messages</h2>
            <div id="feedbackList"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/api';
        let feedbacks = [];

        // Check authentication
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!user || user.role !== 'STORE_OWNER') {
            alert('Access denied. Store owner login required.');
            window.location.href = 'login.html';
        }

        // Load feedback
        async function loadFeedback() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_URL}/feedback/all`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) throw new Error('Failed to load feedback');

                feedbacks = await response.json();
                updateStats();
                displayFeedback();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('feedbackList').innerHTML = `
                    <div class="text-center py-8 text-red-600">
                        <i class="fas fa-exclamation-triangle text-4xl mb-3"></i>
                        <p>Error loading feedback. Please try again.</p>
                    </div>
                `;
            }
        }

        // Update stats
        function updateStats() {
            const total = feedbacks.length;
            const pending = feedbacks.filter(f => f.status === 'PENDING').length;
            const read = feedbacks.filter(f => f.status === 'READ').length;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('readCount').textContent = read;
        }

        // Display feedback
        function displayFeedback() {
            const container = document.getElementById('feedbackList');

            if (feedbacks.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 text-gray-500">
                        <i class="fas fa-inbox text-6xl mb-4"></i>
                        <p class="text-xl">No feedback messages yet</p>
                    </div>
                `;
                return;
            }

            // Sort by created date (newest first)
            const sorted = [...feedbacks].sort((a, b) => 
                new Date(b.createdAt) - new Date(a.createdAt)
            );

            container.innerHTML = sorted.map(feedback => {
                const isUnread = feedback.status === 'PENDING';
                return `
                    <div class="feedback-card border-2 ${isUnread ? 'border-yellow-400 bg-yellow-50' : 'border-gray-200'} rounded-lg p-5 mb-4">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-2">
                                    <h3 class="text-xl font-bold text-gray-800">${feedback.subject}</h3>
                                    <span class="status-badge status-${feedback.status.toLowerCase()}">
                                        ${feedback.status === 'PENDING' ? '🔔 NEW' : '✓ READ'}
                                    </span>
                                    ${feedback.rating ? `
                                        <span class="text-yellow-500 font-bold">
                                            ${'★'.repeat(feedback.rating)}${'☆'.repeat(5 - feedback.rating)}
                                        </span>
                                    ` : ''}
                                </div>
                                <div class="text-sm text-gray-600 mb-3">
                                    <i class="fas fa-user"></i> <strong>${feedback.customer?.fullName || 'Customer'}</strong>
                                    <span class="mx-2">|</span>
                                    <i class="fas fa-envelope"></i> ${feedback.customer?.email || 'N/A'}
                                    <span class="mx-2">|</span>
                                    <i class="fas fa-clock"></i> ${new Date(feedback.createdAt).toLocaleString()}
                                </div>
                                ${feedback.feedbackType ? `
                                    <div class="text-sm mb-2">
                                        <span class="px-2 py-1 bg-blue-100 text-blue-800 rounded">
                                            ${feedback.feedbackType}
                                        </span>
                                    </div>
                                ` : ''}
                            </div>
                        </div>

                        <div class="bg-white p-4 rounded-lg mb-4 border-l-4 border-blue-500">
                            <p class="text-gray-700 whitespace-pre-wrap">${feedback.message}</p>
                        </div>

                        ${feedback.order ? `
                            <div class="text-sm text-gray-600 mb-3">
                                <i class="fas fa-receipt"></i> Related to Order: <strong>${feedback.order.orderNumber}</strong>
                            </div>
                        ` : ''}

                        <div class="flex gap-2">
                            ${feedback.status === 'PENDING' ? `
                                <button onclick="markAsRead(${feedback.id})" 
                                        class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                                    <i class="fas fa-check"></i> Mark as Read
                                </button>
                            ` : ''}
                            <button onclick="deleteFeedback(${feedback.id})" 
                                    class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Mark as read
        async function markAsRead(id) {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_URL}/feedback/${id}/mark-read`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) throw new Error('Failed to mark as read');

                alert('✅ Feedback marked as read');
                await loadFeedback();
            } catch (error) {
                console.error('Error:', error);
                alert('❌ Error marking feedback as read');
            }
        }

        // Delete feedback
        async function deleteFeedback(id) {
            if (!confirm('Are you sure you want to delete this feedback?')) return;

            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_URL}/feedback/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) throw new Error('Failed to delete feedback');

                alert('✅ Feedback deleted successfully');
                await loadFeedback();
            } catch (error) {
                console.error('Error:', error);
                alert('❌ Error deleting feedback');
            }
        }

        // Initialize
        loadFeedback();
    </script>
</body>
</html>
