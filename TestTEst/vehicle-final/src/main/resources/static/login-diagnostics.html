<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Diagnostics</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-lg p-8">
        <h1 class="text-3xl font-bold mb-6 text-blue-600">🔍 Login Diagnostics</h1>
        
        <div class="mb-6">
            <h2 class="text-xl font-bold mb-3">Current Login Status:</h2>
            <div id="loginStatus" class="bg-gray-50 p-4 rounded"></div>
        </div>

        <div class="mb-6">
            <h2 class="text-xl font-bold mb-3">Token:</h2>
            <div id="tokenInfo" class="bg-gray-50 p-4 rounded break-all"></div>
        </div>

        <div class="mb-6">
            <h2 class="text-xl font-bold mb-3">User Object:</h2>
            <pre id="userInfo" class="bg-gray-50 p-4 rounded overflow-auto"></pre>
        </div>

        <div class="mb-6">
            <h2 class="text-xl font-bold mb-3">Role Check:</h2>
            <div id="roleCheck" class="bg-gray-50 p-4 rounded"></div>
        </div>

        <div class="flex gap-4">
            <button onclick="clearAndLogin()" class="bg-blue-500 text-white px-6 py-3 rounded hover:bg-blue-600">
                Clear Storage & Go to Login
            </button>
            <button onclick="testAccess()" class="bg-green-500 text-white px-6 py-3 rounded hover:bg-green-600">
                Test Admin Access
            </button>
        </div>
    </div>

    <script>
        function displayInfo() {
            const token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');
            const user = userStr ? JSON.parse(userStr) : null;

            // Login Status
            const loginStatus = document.getElementById('loginStatus');
            if (!token) {
                loginStatus.innerHTML = '<span class="text-red-600 font-bold">❌ NOT LOGGED IN</span>';
            } else {
                loginStatus.innerHTML = '<span class="text-green-600 font-bold">✅ LOGGED IN</span>';
            }

            // Token Info
            const tokenInfo = document.getElementById('tokenInfo');
            if (token) {
                tokenInfo.innerHTML = `<span class="text-green-600">Token exists (${token.length} characters)</span><br><span class="text-xs text-gray-600">${token.substring(0, 50)}...</span>`;
            } else {
                tokenInfo.innerHTML = '<span class="text-red-600">No token found</span>';
            }

            // User Info
            const userInfo = document.getElementById('userInfo');
            if (user) {
                userInfo.textContent = JSON.stringify(user, null, 2);
            } else {
                userInfo.textContent = 'No user data found';
            }

            // Role Check
            const roleCheck = document.getElementById('roleCheck');
            if (user) {
                let roleHtml = '<div class="space-y-2">';
                
                // Check different role formats
                roleHtml += '<p><strong>user.role type:</strong> ' + typeof user.role + '</p>';
                
                if (typeof user.role === 'string') {
                    roleHtml += '<p><strong>user.role (string):</strong> ' + user.role + '</p>';
                    roleHtml += '<p><strong>Is ADMIN?</strong> ' + (user.role === 'ADMIN' ? '✅ YES' : '❌ NO (value: ' + user.role + ')') + '</p>';
                } else if (typeof user.role === 'object' && user.role !== null) {
                    roleHtml += '<p><strong>user.role.name:</strong> ' + (user.role.name || 'undefined') + '</p>';
                    roleHtml += '<p><strong>user.role.id:</strong> ' + (user.role.id || 'undefined') + '</p>';
                    roleHtml += '<p><strong>Is ADMIN?</strong> ' + (user.role.name === 'ADMIN' ? '✅ YES' : '❌ NO (value: ' + user.role.name + ')') + '</p>';
                } else {
                    roleHtml += '<p class="text-red-600"><strong>Role is undefined or null!</strong></p>';
                }

                // Overall check
                const userRole = typeof user.role === 'string' ? user.role : user.role?.name;
                if (userRole === 'ADMIN') {
                    roleHtml += '<div class="mt-4 p-3 bg-green-100 border border-green-400 rounded">';
                    roleHtml += '<p class="text-green-800 font-bold">✅ ACCESS GRANTED - You can access admin-users.html</p>';
                    roleHtml += '</div>';
                } else {
                    roleHtml += '<div class="mt-4 p-3 bg-red-100 border border-red-400 rounded">';
                    roleHtml += '<p class="text-red-800 font-bold">❌ ACCESS DENIED - You need ADMIN role</p>';
                    roleHtml += '<p class="text-red-600 text-sm mt-2">Current role: ' + (userRole || 'undefined') + '</p>';
                    roleHtml += '</div>';
                }
                
                roleHtml += '</div>';
                roleCheck.innerHTML = roleHtml;
            } else {
                roleCheck.innerHTML = '<span class="text-red-600">No user data to check</span>';
            }
        }

        function clearAndLogin() {
            if (confirm('This will clear your login data and redirect to login page. Continue?')) {
                localStorage.clear();
                window.location.href = 'login.html';
            }
        }

        function testAccess() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const userRole = typeof user.role === 'string' ? user.role : user.role?.name;
            
            if (!token) {
                alert('❌ No token found! Please login first.');
                return;
            }
            
            if (userRole !== 'ADMIN') {
                alert('❌ Access Denied!\n\nYour role: ' + (userRole || 'undefined') + '\nRequired role: ADMIN\n\nPlease login as admin user.');
                return;
            }
            
            alert('✅ Access Granted!\n\nYou can access admin-users.html');
            if (confirm('Would you like to go to admin-users.html now?')) {
                window.location.href = 'admin-users.html';
            }
        }

        // Display info on load
        window.onload = displayInfo;

        // Auto-refresh every 2 seconds
        setInterval(displayInfo, 2000);
    </script>
</body>
</html>
