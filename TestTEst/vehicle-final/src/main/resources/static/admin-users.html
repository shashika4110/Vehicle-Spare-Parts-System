<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - User Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);
        }
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background-color: #fefefe;
            margin: auto;
            padding: 20px;
            border: 1px solid #888;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Navigation -->
    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <h1 class="text-xl font-bold">Admin Dashboard</h1>
                    <span class="text-sm">User Management</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="adminName" class="text-sm"></span>
                    <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded">
                        <i class="fas fa-sign-out-alt mr-2"></i>Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow">
                <div class="flex items-center">
                    <div class="bg-blue-500 text-white p-3 rounded-full">
                        <i class="fas fa-users text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-gray-500 text-sm">Total Users</p>
                        <p class="text-2xl font-bold" id="totalUsers">0</p>
                    </div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-lg shadow">
                <div class="flex items-center">
                    <div class="bg-green-500 text-white p-3 rounded-full">
                        <i class="fas fa-user-check text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-gray-500 text-sm">Active Users</p>
                        <p class="text-2xl font-bold" id="activeUsers">0</p>
                    </div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-lg shadow">
                <div class="flex items-center">
                    <div class="bg-purple-500 text-white p-3 rounded-full">
                        <i class="fas fa-store text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-gray-500 text-sm">Store Owners</p>
                        <p class="text-2xl font-bold" id="storeOwners">0</p>
                    </div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-lg shadow">
                <div class="flex items-center">
                    <div class="bg-orange-500 text-white p-3 rounded-full">
                        <i class="fas fa-truck text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-gray-500 text-sm">Delivery Staff</p>
                        <p class="text-2xl font-bold" id="deliveryStaff">0</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="mb-6 flex justify-between items-center">
            <h2 class="text-2xl font-bold">User Management</h2>
            <div class="flex space-x-2">
                <a href="delivery-boy-registration.html" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg">
                    <i class="fas fa-user-plus mr-2"></i>Register Delivery Boy
                </a>
                <a href="delivery-staff-dashboard.html" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">
                    <i class="fas fa-users mr-2"></i>View Delivery Boys
                </a>
                <button onclick="openCreateModal()" class="bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded-lg">
                    <i class="fas fa-plus mr-2"></i>Create New User
                </button>
            </div>
        </div>

        <!-- Filter Buttons -->
        <div class="mb-6 flex space-x-2">
            <button onclick="filterUsers('ALL')" class="filter-btn bg-blue-500 text-white px-4 py-2 rounded">All Users</button>
            <button onclick="filterUsers('ADMIN')" class="filter-btn bg-gray-500 text-white px-4 py-2 rounded">Admins</button>
            <button onclick="filterUsers('STORE_OWNER')" class="filter-btn bg-purple-500 text-white px-4 py-2 rounded">Store Owners</button>
            <button onclick="filterUsers('CUSTOMER')" class="filter-btn bg-green-500 text-white px-4 py-2 rounded">Customers</button>
            <button onclick="filterUsers('DELIVERY_STAFF')" class="filter-btn bg-orange-500 text-white px-4 py-2 rounded">Delivery Staff</button>
        </div>

        <!-- Users Table -->
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="min-w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Username</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Full Name</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Role</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody" class="bg-white divide-y divide-gray-200">
                    <!-- Users will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Create/Edit User Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modalTitle" class="text-2xl font-bold">Create New User</h2>
                <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>
            <form id="userForm" onsubmit="submitUser(event)">
                <input type="hidden" id="userId" name="id">
                
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Username *</label>
                    <input type="text" id="username" name="username" required
                           class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500">
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Full Name *</label>
                    <input type="text" id="fullName" name="fullName" required
                           class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500">
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Email *</label>
                    <input type="email" id="email" name="email" required
                           class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500">
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Password <span id="passwordNote" class="text-gray-500 text-xs">(leave empty to keep current)</span></label>
                    <input type="password" id="password" name="password"
                           class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500">
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Phone</label>
                    <input type="text" id="phone" name="phone"
                           class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500">
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Address</label>
                    <textarea id="address" name="address" rows="3"
                              class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500"></textarea>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Role *</label>
                    <select id="roleId" name="roleId" required
                            class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500">
                        <option value="">Select Role</option>
                        <option value="1">Admin</option>
                        <option value="2">Store Owner</option>
                        <option value="3">Customer</option>
                        <option value="4">Delivery Staff</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="flex items-center">
                        <input type="checkbox" id="isActive" name="isActive" checked
                               class="mr-2 w-4 h-4">
                        <span class="text-gray-700 text-sm font-bold">Active</span>
                    </label>
                </div>

                <div class="flex justify-end space-x-4">
                    <button type="button" onclick="closeModal()"
                            class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-lg">
                        Cancel
                    </button>
                    <button type="submit"
                            class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg">
                        <i class="fas fa-save mr-2"></i>Save User
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/api';
        let allUsers = [];
        let currentFilter = 'ALL';

        // Check authentication
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        // Check role - handle both string format ("ADMIN") and object format ({name: "ADMIN"})
        const userRole = typeof user.role === 'string' ? user.role : user.role?.name;
        
        if (!token || userRole !== 'ADMIN') {
            alert('Access denied! Admin privileges required.');
            window.location.href = 'login.html';
        }

        document.getElementById('adminName').textContent = user.fullName || user.username;

        // Load users on page load
        window.onload = function() {
            loadUsers();
        };

        // Load all users
        async function loadUsers() {
            try {
                const response = await fetch(`${API_URL}/users`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load users');
                }

                allUsers = await response.json();
                updateStats();
                displayUsers(allUsers);
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to load users: ' + error.message);
            }
        }

        // Update statistics
        function updateStats() {
            const total = allUsers.length;
            const active = allUsers.filter(u => u.isActive).length;
            const storeOwners = allUsers.filter(u => u.role.name === 'STORE_OWNER').length;
            const delivery = allUsers.filter(u => u.role.name === 'DELIVERY_STAFF').length;

            document.getElementById('totalUsers').textContent = total;
            document.getElementById('activeUsers').textContent = active;
            document.getElementById('storeOwners').textContent = storeOwners;
            document.getElementById('deliveryStaff').textContent = delivery;
        }

        // Display users in table
        function displayUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';

            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-4 text-center text-gray-500">No users found</td></tr>';
                return;
            }

            users.forEach(user => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50';
                
                const statusBadge = user.isActive
                    ? '<span class="px-2 py-1 text-xs bg-green-100 text-green-800 rounded">Active</span>'
                    : '<span class="px-2 py-1 text-xs bg-red-100 text-red-800 rounded">Inactive</span>';

                row.innerHTML = `
                    <td class="px-6 py-4 text-sm">${user.id}</td>
                    <td class="px-6 py-4 text-sm font-medium">${user.username}</td>
                    <td class="px-6 py-4 text-sm">${user.fullName}</td>
                    <td class="px-6 py-4 text-sm">${user.email}</td>
                    <td class="px-6 py-4 text-sm">
                        <span class="px-2 py-1 text-xs bg-blue-100 text-blue-800 rounded">${user.role.name}</span>
                    </td>
                    <td class="px-6 py-4 text-sm">${statusBadge}</td>
                    <td class="px-6 py-4 text-sm space-x-2">
                        <button onclick="editUser(${user.id})" 
                                class="text-blue-600 hover:text-blue-800">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="deleteUser(${user.id}, '${user.username}')" 
                                class="text-red-600 hover:text-red-800">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // Filter users by role
        function filterUsers(role) {
            currentFilter = role;
            
            if (role === 'ALL') {
                displayUsers(allUsers);
            } else {
                const filtered = allUsers.filter(u => u.role.name === role);
                displayUsers(filtered);
            }
        }

        // Open create modal
        function openCreateModal() {
            document.getElementById('modalTitle').textContent = 'Create New User';
            document.getElementById('userForm').reset();
            document.getElementById('userId').value = '';
            document.getElementById('isActive').checked = true;
            document.getElementById('passwordNote').style.display = 'none';
            document.getElementById('password').required = true;
            document.getElementById('userModal').classList.add('active');
        }

        // Edit user
        async function editUser(userId) {
            try {
                const response = await fetch(`${API_URL}/users/${userId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load user');
                }

                const user = await response.json();
                
                document.getElementById('modalTitle').textContent = 'Edit User';
                document.getElementById('userId').value = user.id;
                document.getElementById('username').value = user.username;
                document.getElementById('fullName').value = user.fullName;
                document.getElementById('email').value = user.email;
                document.getElementById('password').value = '';
                document.getElementById('phone').value = user.phone || '';
                document.getElementById('address').value = user.address || '';
                document.getElementById('roleId').value = user.role.id;
                document.getElementById('isActive').checked = user.isActive;
                document.getElementById('passwordNote').style.display = 'inline';
                document.getElementById('password').required = false;
                
                document.getElementById('userModal').classList.add('active');
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to load user details: ' + error.message);
            }
        }

        // Submit user form (create or update)
        async function submitUser(event) {
            event.preventDefault();

            const userId = document.getElementById('userId').value;
            const userData = {
                username: document.getElementById('username').value,
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                isActive: document.getElementById('isActive').checked,
                role: {
                    id: parseInt(document.getElementById('roleId').value)
                }
            };

            const password = document.getElementById('password').value;
            if (password) {
                userData.password = password;
            }

            try {
                let response;
                if (userId) {
                    // Update existing user
                    response = await fetch(`${API_URL}/users/${userId}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(userData)
                    });
                } else {
                    // Create new user
                    response = await fetch(`${API_URL}/users`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(userData)
                    });
                }

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Failed to save user');
                }

                alert(userId ? 'User updated successfully!' : 'User created successfully!');
                closeModal();
                loadUsers();
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to save user: ' + error.message);
            }
        }

        // Delete user
        async function deleteUser(userId, username) {
            if (!confirm(`Are you sure you want to delete user "${username}"? This action cannot be undone.`)) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/users/${userId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Failed to delete user');
                }

                alert('User deleted successfully!');
                loadUsers();
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to delete user: ' + error.message);
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('userModal').classList.remove('active');
        }

        // Logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
