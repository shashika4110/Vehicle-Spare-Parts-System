<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warranty Claims Management - Customer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .crud-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 5px;
        }

        .create-badge { background: #10b981; color: white; }
        .read-badge { background: #3b82f6; color: white; }
        .update-badge { background: #f59e0b; color: white; }
        .delete-badge { background: #ef4444; color: white; }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e5e7eb;
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: bold;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .form-section h3 {
            color: #667eea;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-secondary {
            background: #6b7280;
            color: white;
        }

        .claims-grid {
            display: grid;
            gap: 20px;
        }

        .claim-card {
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s;
        }

        .claim-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
        }

        .claim-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f3f4f6;
        }

        .claim-number {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-under_review {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-approved {
            background: #d1fae5;
            color: #065f46;
        }

        .status-rejected {
            background: #fee2e2;
            color: #991b1b;
        }

        .claim-details {
            margin-bottom: 15px;
        }

        .detail-row {
            display: flex;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .detail-label {
            font-weight: bold;
            color: #6b7280;
            width: 140px;
        }

        .detail-value {
            color: #374151;
            flex: 1;
        }

        .claim-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .claim-actions button {
            padding: 8px 16px;
            font-size: 14px;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .alert-info {
            background: #dbeafe;
            color: #1e40af;
            border-left: 4px solid #3b82f6;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 18px;
        }

        .back-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            padding: 10px 20px;
            background: #6b7280;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #4b5563;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .tabs {
                flex-wrap: wrap;
            }

            .claim-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .claim-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="customer-dashboard.html" class="back-btn">← Back to Dashboard</a>
        
        <h1>🛡️ Warranty Claims Management</h1>
        <p class="subtitle">
            <span class="crud-badge create-badge">CREATE</span>
            <span class="crud-badge read-badge">READ</span>
            <span class="crud-badge update-badge">UPDATE</span>
            <span class="crud-badge delete-badge">DELETE</span>

        </p>

        <div id="alertContainer"></div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('view')">📋 View My Claims (READ)</button>
            <button class="tab" onclick="switchTab('create')">➕ Create New Claim (CREATE)</button>
        </div>

        <!-- VIEW CLAIMS TAB (READ) -->
        <div id="viewTab" class="tab-content active">
            <div id="claimsContainer" class="loading">Loading claims...</div>
        </div>

        <!-- CREATE CLAIM TAB (CREATE) -->
        <div id="createTab" class="tab-content">
            <div class="form-section">
                <h3>
                    <span class="crud-badge create-badge">CREATE</span>
                    Create New Warranty Claim
                </h3>

                <div class="alert alert-info">
                    <strong>ℹ️ Requirements:</strong> You can only create warranty claims for DELIVERED orders within the warranty period.
                </div>

                <form id="createClaimForm">
                    <div class="form-group">
                        <label>Select Your Delivered Order:</label>
                        <select id="orderSelect" required>
                            <option value="">Loading orders...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Product from Order:</label>
                        <select id="productSelect" required disabled>
                            <option value="">Select an order first</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Issue Description: *</label>
                        <textarea id="issueDescription" required placeholder="Describe the problem with the product..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Additional Comments:</label>
                        <textarea id="customerComments" placeholder="Any additional information..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-success">
                        ✅ Submit Warranty Claim (CREATE)
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8080/api';
        let currentUser = null;
        let allClaims = [];
        let deliveredOrders = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = user;
            await loadClaims();
            await loadDeliveredOrders();
        });

        // Switch tabs
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'view') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('viewTab').classList.add('active');
            } else if (tab === 'create') {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('createTab').classList.add('active');
            }
        }

        // Show alert
        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `
                <div class="alert alert-${type}">
                    ${message}
                </div>
            `;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        // READ - Load claims
        async function loadClaims() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE_URL}/warranty-claims/my-claims/${currentUser.id}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    allClaims = await response.json();
                    displayClaims();
                } else {
                    throw new Error('Failed to load claims');
                }
            } catch (error) {
                console.error('Error loading claims:', error);
                document.getElementById('claimsContainer').innerHTML = `
                    <div class="alert alert-error">
                        ❌ Error loading warranty claims. Please try again.
                    </div>
                `;
            }
        }

        // Display claims
        function displayClaims() {
            const container = document.getElementById('claimsContainer');
            
            if (allClaims.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        <h3>No Warranty Claims Yet</h3>
                        <p>You haven't created any warranty claims. Click "Create New Claim" to get started.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="claims-grid">
                    ${allClaims.map(claim => createClaimCard(claim)).join('')}
                </div>
            `;
        }

        // Create claim card HTML
        function createClaimCard(claim) {
            const canEdit = claim.status === 'PENDING';
            const statusClass = `status-${claim.status.toLowerCase().replace('_', '')}`;
            
            return `
                <div class="claim-card">
                    <div class="claim-header">
                        <div class="claim-number">${claim.claimNumber}</div>
                        <div class="status-badge ${statusClass}">${claim.status}</div>
                    </div>
                    
                    <div class="claim-details">
                        <div class="detail-row">
                            <span class="detail-label">Product:</span>
                            <span class="detail-value">${claim.product?.name || 'N/A'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Order ID:</span>
                            <span class="detail-value">#${claim.order?.id}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Purchase Date:</span>
                            <span class="detail-value">${claim.purchaseDate}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Warranty Expiry:</span>
                            <span class="detail-value">${claim.warrantyExpiryDate}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Issue:</span>
                            <span class="detail-value">${claim.issueDescription}</span>
                        </div>
                        ${claim.customerComments ? `
                        <div class="detail-row">
                            <span class="detail-label">Comments:</span>
                            <span class="detail-value">${claim.customerComments}</span>
                        </div>
                        ` : ''}
                        <div class="detail-row">
                            <span class="detail-label">Created:</span>
                            <span class="detail-value">${new Date(claim.createdAt).toLocaleString()}</span>
                        </div>
                        
                        <!-- Store Owner Response - HIGHLIGHTED -->
                        ${claim.status === 'PENDING' ? `
                        <div style="margin-top: 15px; padding: 15px; background: #fff3cd; border-left: 4px solid #ffc107; border-radius: 5px;">
                            <strong style="color: #856404;">⏳ Status: Waiting for Store Owner Response</strong>
                            <p style="color: #856404; margin-top: 5px; font-size: 14px;">Your warranty claim is under review. The store owner will approve or reject your claim soon.</p>
                        </div>
                        ` : ''}
                        
                        ${claim.status === 'APPROVED' && claim.storeResponse ? `
                        <div style="margin-top: 15px; padding: 20px; background: #d4edda; border-left: 4px solid #28a745; border-radius: 8px; box-shadow: 0 2px 8px rgba(40,167,69,0.2);">
                            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                                <span style="font-size: 24px;">✅</span>
                                <strong style="color: #155724; font-size: 18px;">CLAIM APPROVED!</strong>
                            </div>
                            <div style="background: white; padding: 15px; border-radius: 5px; margin-top: 10px;">
                                <strong style="color: #155724;">Store Owner Response:</strong>
                                <p style="color: #155724; margin-top: 8px; font-size: 15px; line-height: 1.6;">${claim.storeResponse}</p>
                            </div>
                        </div>
                        ` : ''}
                        
                        ${claim.status === 'REJECTED' && claim.storeResponse ? `
                        <div style="margin-top: 15px; padding: 20px; background: #f8d7da; border-left: 4px solid #dc3545; border-radius: 8px; box-shadow: 0 2px 8px rgba(220,53,69,0.2);">
                            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                                <span style="font-size: 24px;">❌</span>
                                <strong style="color: #721c24; font-size: 18px;">CLAIM REJECTED</strong>
                            </div>
                            <div style="background: white; padding: 15px; border-radius: 5px; margin-top: 10px;">
                                <strong style="color: #721c24;">Store Owner Response:</strong>
                                <p style="color: #721c24; margin-top: 8px; font-size: 15px; line-height: 1.6;">${claim.storeResponse}</p>
                            </div>
                        </div>
                        ` : ''}
                        
                        ${claim.status === 'UNDER_REVIEW' ? `
                        <div style="margin-top: 15px; padding: 15px; background: #cce5ff; border-left: 4px solid #007bff; border-radius: 5px;">
                            <strong style="color: #004085;">🔍 Status: Under Review</strong>
                            <p style="color: #004085; margin-top: 5px; font-size: 14px;">The store owner is currently reviewing your warranty claim.</p>
                        </div>
                        ` : ''}
                    </div>
                    
                    <div class="claim-actions">
                        ${canEdit ? `
                            <button class="btn btn-warning" onclick="editClaim(${claim.id})">
                                ✏️ Edit (UPDATE)
                            </button>
                            <button class="btn btn-danger" onclick="deleteClaim(${claim.id})">
                                🗑️ Delete (DELETE)
                            </button>
                        ` : `
                            <button class="btn btn-secondary" disabled>
                                🔒 Cannot modify ${claim.status} claim
                            </button>
                        `}
                    </div>
                </div>
            `;
        }

        // Load delivered orders
        async function loadDeliveredOrders() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE_URL}/orders/customer/${currentUser.id}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const allOrders = await response.json();
                    deliveredOrders = allOrders.filter(order => order.status === 'DELIVERED');
                    
                    const orderSelect = document.getElementById('orderSelect');
                    orderSelect.innerHTML = '<option value="">Select an order</option>';
                    
                    deliveredOrders.forEach(order => {
                        orderSelect.innerHTML += `
                            <option value="${order.id}">
                                Order #${order.id} - ${order.orderDate} - Total: $${order.totalAmount}
                            </option>
                        `;
                    });
                }
            } catch (error) {
                console.error('Error loading orders:', error);
            }
        }

        // Handle order selection
        document.getElementById('orderSelect')?.addEventListener('change', function() {
            const orderId = this.value;
            const productSelect = document.getElementById('productSelect');
            
            if (!orderId) {
                productSelect.disabled = true;
                productSelect.innerHTML = '<option value="">Select an order first</option>';
                return;
            }

            const order = deliveredOrders.find(o => o.id == orderId);
            if (order && order.orderItems) {
                productSelect.disabled = false;
                productSelect.innerHTML = '<option value="">Select a product</option>';
                
                order.orderItems.forEach(item => {
                    productSelect.innerHTML += `
                        <option value="${item.sparePart.id}">
                            ${item.sparePart.name} - Qty: ${item.quantity} - $${item.unitPrice}
                        </option>
                    `;
                });
            }
        });

        // CREATE - Submit claim
        document.getElementById('createClaimForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const orderId = document.getElementById('orderSelect').value;
            const productId = document.getElementById('productSelect').value;
            const issueDescription = document.getElementById('issueDescription').value;
            const customerComments = document.getElementById('customerComments').value;

            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE_URL}/warranty-claims/create`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        customerId: currentUser.id,
                        orderId: parseInt(orderId),
                        productId: parseInt(productId),
                        issueDescription,
                        customerComments
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('✅ Warranty claim created successfully! Claim Number: ' + data.claimNumber, 'success');
                    document.getElementById('createClaimForm').reset();
                    document.getElementById('productSelect').disabled = true;
                    await loadClaims();
                    switchTab('view');
                } else {
                    throw new Error(data.error || 'Failed to create claim');
                }
            } catch (error) {
                showAlert('❌ Error: ' + error.message, 'error');
            }
        });

        // UPDATE - Edit claim
        async function editClaim(claimId) {
            const claim = allClaims.find(c => c.id === claimId);
            if (!claim) return;

            const newIssue = prompt('Edit Issue Description:', claim.issueDescription);
            if (newIssue === null) return;

            const newComments = prompt('Edit Comments:', claim.customerComments || '');

            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE_URL}/warranty-claims/${claimId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        issueDescription: newIssue,
                        customerComments: newComments
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('✅ Warranty claim updated successfully!', 'success');
                    await loadClaims();
                } else {
                    throw new Error(data.error || 'Failed to update claim');
                }
            } catch (error) {
                showAlert('❌ Error: ' + error.message, 'error');
            }
        }

        // DELETE - Delete claim
        async function deleteClaim(claimId) {
            if (!confirm('Are you sure you want to delete this warranty claim? This action cannot be undone.')) {
                return;
            }

            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE_URL}/warranty-claims/${claimId}/customer/${currentUser.id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('✅ Warranty claim deleted successfully!', 'success');
                    await loadClaims();
                } else {
                    throw new Error(data.error || 'Failed to delete claim');
                }
            } catch (error) {
                showAlert('❌ Error: ' + error.message, 'error');
            }
        }
    </script>
</body>
</html>
